services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: osiris
      POSTGRES_PASSWORD: osiris_dev_pass
      POSTGRES_DB: osiris_inventario
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osiris -d osiris_inventario"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      DATABASE_URL: postgresql+asyncpg://osiris:osiris_dev_pass@postgres:5432/osiris_inventario
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      KARDEX_METHOD: PEPS
      APP_ENV: development
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:5173"]'
    volumes:
      - ./app:/app/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else sys.exit(1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  web:
    build:
      context: ../osiris-inventario-fe
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ../osiris-inventario-fe:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
